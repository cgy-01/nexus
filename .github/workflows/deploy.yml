name: Nexus Automated Deployment

on:
  push:
    branches: [ main ] # 只有推送到 main 分支时才会触发

jobs:
  # ── 后端部署 ──
  deploy-backend:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Restart Backend Docker
        run: |
          cd backend
          docker compose up -d --build

  # ── 前端热更新 ──
  publish-frontend-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 升级到 Node.js 24，消除 GitHub Actions 的废弃警告
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 把 build 改成 update，直接将 JS 代码热更推送到 preview 频道
      - name: Publish OTA Update (EAS Update)
        run: |
          cd app
          eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_NEXUS_TOKEN }}