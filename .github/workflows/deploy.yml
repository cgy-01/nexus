name: Nexus Automated Deployment

on:
  push:
    branches: [ main ] # 只有推送到 main 分支时才会触发

jobs:
  # ── 任务零：检查哪些目录发生了代码变更 ──
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check paths for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'app/**'

  # ── 任务一：后端部署 ──
  deploy-backend:
    needs: check-changes # 必须等 check-changes 任务跑完
    if: ${{ needs.check-changes.outputs.backend == 'true' }} # 只有 backend 目录有变更才执行
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Restart Backend Docker
        run: |
          cd backend
          ln -sf /opt/nexus/.env .env
          docker compose up -d --build

  # ── 任务二：前端热更新 ──
  publish-frontend-update:
    needs: check-changes # 必须等 check-changes 任务跑完
    if: ${{ needs.check-changes.outputs.frontend == 'true' }} # 只有 app 目录有变更才执行
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 升级到 Node.js 24，消除 GitHub Actions 的废弃警告
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 把 build 改成 update，直接将 JS 代码热更推送到 preview 频道
      - name: Publish OTA Update (EAS Update)
        run: |
          cd app
          eas update --branch preview --platform android --message "${{ github.event.head_commit.message }}" --non-interactive
          eas update --branch preview --platform ios --message "${{ github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_NEXUS_TOKEN }}
