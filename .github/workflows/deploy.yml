name: Nexus Automated Deployment

on:
  push:
    branches: [ main ]

jobs:
  # ── 后端部署（杭州服务器自托管 Runner）──
  deploy-backend:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Restart Backend Docker
        run: |
          cd backend
          docker compose up -d --build

  # ── 前端打包（GitHub 云端，不占服务器资源）──
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android App (APK)
        run: |
          cd app
          eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXO_NEXUS_TOKEN }}
